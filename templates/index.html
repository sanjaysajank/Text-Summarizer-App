<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">


</head>

<body>

<div class="container">


<div class="main-card">

    <h1>AI TEXT SUMMARIZER</h1>
    <p class="tagline">Convert lengthy articles into concise summaries using NLP</p>

    <form method="POST">

        <label class="label-title">Original Article</label>

        <textarea
                id="articleText"
                name="text"
                class="form-control"
                placeholder="Paste your article here..."
                required>{{ request.form.get('text','') }}</textarea>

        <div class="stats">
            <span id="wordCount">Words: 0</span>
            <span id="charCount">Characters: 0</span>
        </div>

        <div class="btn-group-custom">

            <button type="submit" class="btn btn-summarize">
                Generate Summary
            </button>

            <button type="button" class="btn btn-clear" onclick="clearText()">
                New Article
            </button>

        </div>

    </form>

    {% if summary %}
    <div class="summary-section">

        <h3>Generated Summary</h3>

        <div class="summary-box" id="summaryText">
            {{ summary }}
        </div>

        <button class="btn btn-copy" onclick="copySummary()">
            Copy Summary
        </button>

    </div>
    {% endif %}

</div>


</div>

<script>

const textarea = document.getElementById("articleText");

if(textarea){
    textarea.addEventListener("input", function(){

        let words = this.value.trim().split(/\s+/).filter(Boolean).length;
        let chars = this.value.length;

        document.getElementById("wordCount").innerText = "Words: " + words;
        document.getElementById("charCount").innerText = "Characters: " + chars;
    });
}

function clearText(){
    document.getElementById("articleText").value="";
}

function copySummary(){

    let text=document.getElementById("summaryText").innerText;

    navigator.clipboard.writeText(text);

    alert("Summary copied");
}

</script>

</body>
</html>
